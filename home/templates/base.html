<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            min-height:100vh;
            background: linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #2563eb
            );
            overflow-x:hidden;
            color:white;
        }

        body::before{
            content:'';
            position:absolute;
            width:300px;
            height:300px;
            background:#60a5fa;
            border-radius:50%;
            top:-100px;
            left:-100px;
            filter:blur(120px);
        }

        body::after{
            content:'';
            position:absolute;
            width:300px;
            height:300px;
            background:#9333ea;
            border-radius:50%;
            bottom:-100px;
            right:-100px;
            filter:blur(120px);
        }

        nav{
            width:90%;
            margin:20px auto;
            padding:18px 40px;

            display:flex;
            justify-content:space-between;
            align-items:center;

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.1);

            backdrop-filter:blur(15px);

            border-radius:20px;

            box-shadow:0 8px 32px rgba(0,0,0,0.2);
        }

        .logo{
            font-size:28px;
            font-weight:700;
            color:white;
        }

        .nav-links a{
            text-decoration:none;
            color:white;
            margin-left:25px;
            font-size:17px;
            transition:0.3s;
        }

        .nav-links a:hover{
            color:#93c5fd;
        }

        .container{
            width:90%;
            max-width:1200px;
            margin:60px auto;
        }

        .glass-card{

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.1);

            backdrop-filter:blur(18px);

            border-radius:25px;

            padding:40px;

            box-shadow:0 8px 32px rgba(0,0,0,0.25);
        }

        h1{
            font-size:55px;
            margin-bottom:20px;
            font-weight:700;
        }

        p{
            color:#dbeafe;
            line-height:1.8;
            font-size:18px;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            padding:14px 30px;

            background:rgba(255,255,255,0.12);

            border:1px solid rgba(255,255,255,0.15);

            backdrop-filter:blur(10px);

            border-radius:12px;

            color:white;
            text-decoration:none;

            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
            background:rgba(255,255,255,0.2);
        }

        table{
            width:100%;
            margin-top:30px;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:15px;
        }

        th{
            background:rgba(255,255,255,0.15);
            padding:18px;
            text-align:left;
        }

        td{
            padding:18px;
            border-bottom:1px solid rgba(255,255,255,0.08);
        }

        tr:hover{
            background:rgba(255,255,255,0.05);
        }

        footer{
            width:90%;
            margin:50px auto 20px auto;

            text-align:center;

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.1);

            backdrop-filter:blur(15px);

            padding:20px;

            border-radius:20px;
        }

        @media(max-width:768px){

            nav{
                flex-direction:column;
                gap:15px;
            }

            .nav-links a{
                margin:0 10px;
            }

            h1{
                font-size:38px;
            }

            .glass-card{
                padding:25px;
            }
        }

    </style>

</head>
<body>

    <nav>

        <div class="logo">
            DjangoUI
        </div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about/">About</a>
            <a href="/contact/">Contact</a>
        </div>

    </nav>

    <div class="container">

        <div class="glass-card">

            {% block content %}

            {% endblock %}

        </div>

    </div>

    <footer>
        © 2026 Django 
    </footer>

</body>
</html>
