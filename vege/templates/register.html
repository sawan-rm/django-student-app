{% extends 'base.html' %}
{% block content %}

<div class="register-wrapper">

  <div class="register-card">

    <h2 class="register-title">Create Account</h2>

    <p class="register-subtitle">
      Join and start sharing your amazing recipes
    </p>

    <form method="POST" class="register-form">
      {% csrf_token %}

      <!-- Username -->
      <div class="form-group">
        <label>Username</label>

        <input
          type="text"
          name="username"
          placeholder="Enter username"
          required
        >
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>

        <input
          type="email"
          name="email"
          placeholder="Enter email"
          required
        >
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>

        <input
          type="password"
          name="password"
          placeholder="Enter password"
          required
        >
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label>Confirm Password</label>

        <input
          type="password"
          name="confirm_password"
          placeholder="Confirm password"
          required
        >
      </div>

      <!-- Submit -->
      <button type="submit" class="register-btn">
        Create Account
      </button>

    </form>

    <!-- Login Redirect -->
    <div class="login-link">
      Already have an account?
      <a href="/login/">Login</a>
    </div>

  </div>

</div>

<style>

  .register-wrapper {
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 30px;
  }

  .register-card {

    width: 100%;
    max-width: 500px;

    background: rgba(255,255,255,0.06);

    border: 1px solid rgba(255,255,255,0.1);

    backdrop-filter: blur(12px);

    border-radius: 24px;

    padding: 40px;

    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }

  .register-title {
    font-size: 36px;
    font-weight: 700;

    color: white;

    margin-bottom: 8px;
  }

  .register-subtitle {
    color: #cbd5e1;

    margin-bottom: 30px;

    font-size: 14px;
  }

  .register-form {
    display: flex;
    flex-direction: column;

    gap: 20px;
  }

  .form-group label {
    display: block;

    margin-bottom: 8px;

    color: #e2e8f0;

    font-size: 14px;
  }

  .form-group input {

    width: 100%;

    padding: 14px 16px;

    border-radius: 14px;

    border: 1px solid rgba(255,255,255,0.1);

    background: rgba(255,255,255,0.06);

    color: white;

    outline: none;

    transition: 0.3s;
  }

  .form-group input:focus {

    border-color: #60a5fa;

    background: rgba(255,255,255,0.1);
  }

  .register-btn {

    margin-top: 10px;

    padding: 14px;

    border: none;

    border-radius: 14px;

    background: linear-gradient(135deg, #3b82f6, #9333ea);

    color: white;

    font-size: 15px;
    font-weight: 600;

    cursor: pointer;

    transition: 0.3s;
  }

  .register-btn:hover {

    transform: translateY(-2px);

    box-shadow: 0 10px 25px rgba(59,130,246,0.3);
  }

  .login-link {

    margin-top: 22px;

    text-align: center;

    color: #cbd5e1;

    font-size: 14px;
  }

  .login-link a {

    color: #60a5fa;

    text-decoration: none;

    font-weight: 600;
  }

  .login-link a:hover {
    text-decoration: underline;
  }

</style>

{% endblock %}
